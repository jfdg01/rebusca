<!doctype html>
<meta charset="utf-8">
<title>Rebusca</title>
<link rel="stylesheet" href="app.css">


<header>
  <div class="brand">
    <h1>Rebusca</h1>
    <span class="eyebrow">inspector de hallazgos · wallapop</span>
  </div>
  <div class="tools">
    <button id="perfilChip" class="chip" hidden title="cambiar de perfil"></button>
    <span class="flt">
      <input type="search" id="kw" placeholder="buscar en wallapop…">
      <select id="since" title="frescura del anuncio">
        <option value="">cualquiera</option>
        <option value="hora">última hora</option>
        <option value="dia">último día</option>
        <option value="semana">última semana</option>
        <option value="mes">último mes</option>
      </select>
      <button id="scrape">Buscar</button>
    </span>
    <select id="pick"><option value="">— elige un CSV —</option></select>
    <input type="file" id="file" accept=".csv" title="o carga uno a mano">
    <input type="search" id="q" placeholder="filtrar en todo…">
    <span class="flt">€ <input type="number" id="pmin" placeholder="min" min="0"> – <input type="number" id="pmax" placeholder="max" min="0"></span>
    <span class="flt">km ≤ <input type="number" id="fkm" placeholder="∞" min="0"></span>
    <button id="preset" title="ordena por días, luego precio, luego km">Orden: tiempo·€·km</button>
    <select id="actions" title="quitar en lote">
      <option value="">Acciones…</option>
      <option value="price">Quitar por encima de un precio…</option>
      <option value="envio">Quitar los sin envío</option>
      <option value="reserved">Quitar los reservados</option>
    </select>
    <button id="download" class="primary">★ Descargar interesantes</button>
  </div>
  <div class="stat" id="stat"></div>
</header>

<table><thead></thead><tbody></tbody></table>
<div class="empty" id="empty">Elige un CSV o arrastra aquí la carpeta para empezar a rebuscar.</div>

<div class="gate" id="gate">
  <div class="gate-card">
    <button class="gate-x" id="gateX" hidden title="cerrar">✕</button>
    <h2 id="gateTitle">¿Quién eres?</h2>
    <p>Elige tu perfil o crea uno. Cada persona guarda sus propios chollos (vistos, descartados y favoritos).</p>
    <div class="people" id="people"></div>
    <form class="gate-new" id="gateNew">
      <input id="newName" placeholder="tu nombre…" autocomplete="off" maxlength="40">
      <button class="primary" type="submit">Entrar</button>
    </form>
  </div>
</div>

<div class="snack" id="snack" hidden>
  <span id="snackmsg"></span>
  <button id="undo">Deshacer</button>
</div>

<script src="app.js"></script>
