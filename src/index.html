<!doctype html>
<meta charset="utf-8" />
<meta
    name="viewport"
    content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
/>
<title>Rebusca</title>
<link rel="stylesheet" href="app.css" />

<header>
    <div class="brand">
        <details class="opts" id="perfilOpts">
            <summary title="opciones" data-icon="settings"></summary>
            <div class="menu">
                <button id="perfilChip" class="chip">Cambiar de perfil</button>
            </div>
        </details>
        <div class="brand-title">
            <h1>Rebusca</h1>
            <img
                class="logo"
                src="wallapop-logo.webp"
                alt="Wallapop"
                width="40"
                height="40"
            />
            <span class="eyebrow">rebuscador<br />de chollos</span>
        </div>
        <button class="avatar" id="perfilAvatar" title="cambiar de perfil">
            ?
        </button>
    </div>
    <div class="panel">
        <div class="search">
            <input
                type="search"
                id="kw"
                placeholder="Término a buscar…"
                autocomplete="off"
            />
            <select id="since" title="frescura del anuncio">
                <option value="">cualquiera</option>
                <option value="hora">última hora</option>
                <option value="dia">último día</option>
                <option value="semana" selected>última semana</option>
                <option value="mes">último mes</option>
            </select>
            <button id="scrape" class="primary">Buscar</button>
        </div>
        <label class="titleonly"
            ><input type="checkbox" id="titleOnly" /> solo en el título</label
        >
    </div>
    <div class="panel picker">
        <span class="panel-label"
            >Búsqueda activa <span class="hint">pulsa para cambiar</span></span
        >
        <div class="menu-row">
            <div class="qbox">
                <input
                    id="pick"
                    class="query"
                    type="search"
                    autocomplete="off"
                    placeholder="elige una búsqueda…"
                    title="tus búsquedas — escribe para filtrar"
                />
                <span id="pickSince" class="pick-since" hidden></span>
                <div id="qlist" class="qlist" hidden></div>
            </div>
            <button
                id="manageSearches"
                class="icon-btn"
                title="gestionar búsquedas"
                data-icon="list"
            ></button>
        </div>
        <div class="excl" id="excl" hidden>
            <span class="panel-label">Excluir items que contengan...</span>
            <div class="chips" id="exclChips"></div>
            <input
                id="exclAdd"
                type="search"
                autocomplete="off"
                placeholder="excluir palabra solo en esta búsqueda…"
                title="las cartas con esa palabra en el título se descartan solas (solo en esta búsqueda)"
            />
        </div>
        <details class="cats" id="cats" hidden>
            <summary>
                Excluir por categoría<span class="link" id="catClear" hidden
                    >limpiar</span
                >
            </summary>
            <div class="chips" id="catChips"></div>
        </details>
        <div class="stat" id="stat"></div>
    </div>
    <div class="list-head" id="listHead" hidden>
        <div class="list-head-bar">
            <button
                id="listBack"
                title="volver"
                data-icon="arrow-left"
            ></button>
            <h2 id="listTitle"></h2>
            <button
                id="exportFav"
                class="chip"
                title="copiar la lista al portapapeles"
                hidden
            >
                Copiar
            </button>
        </div>
        <input
            id="listFilter"
            type="search"
            autocomplete="off"
            placeholder="filtrar en la lista…"
            title="filtra por título"
        />
        <div class="swipe-sort" id="listSort">
            <button data-sort="">Entrada</button>
            <button data-sort="precio">Precio</button>
            <button data-sort="dias">Fecha</button>
            <button data-sort="km">Distancia</button>
        </div>
    </div>
</header>

<table hidden>
    <thead></thead>
    <tbody></tbody>
</table>
<div class="empty" id="empty">Para rebuscar debes buscar algo primero.</div>

<div class="loading" id="loading" hidden>
    <svg class="spin" viewBox="0 0 44 44" aria-hidden="true">
        <circle class="track" cx="22" cy="22" r="19"></circle>
        <circle class="arc" cx="22" cy="22" r="19"></circle>
    </svg>
    <div class="loading-count" id="loadingCount">Buscando anuncios.</div>
    <div class="loading-note">
        <span id="loadingTime">0s</span> buscando… ·
        <span class="link" id="stopScrape">parar búsqueda</span>
    </div>
</div>

<button id="swipeFab" hidden>Empezar a rebuscar</button>

<div class="gate" id="gate">
    <div class="gate-inner">
        <h2 id="gateTitle">¿Quién eres?</h2>
        <div class="tiles" id="tiles"></div>
        <form class="creator" id="creator" hidden>
            <input
                id="newName"
                placeholder="tu nombre…"
                autocomplete="off"
                maxlength="40"
            />
            <div class="swatches" id="swatches"></div>
            <div class="creator-btns">
                <button
                    type="button"
                    class="ghost danger"
                    id="deletePerfil"
                    hidden
                >
                    Borrar
                </button>
                <button type="button" class="ghost" id="cancelCreate" hidden>
                    Cancelar
                </button>
                <button class="primary" type="submit" id="saveBtn">
                    Guardar
                </button>
            </div>
        </form>
        <button class="gate-exit" id="gateX" hidden>Salir</button>
    </div>
</div>

<div class="searches" id="searchesView" hidden>
    <div class="searches-bar">
        <button
            class="swipe-x"
            id="searchesX"
            title="volver"
            data-icon="arrow-left"
        ></button>
        <h2>Tus búsquedas</h2>
    </div>
    <input
        id="searchesFilter"
        type="search"
        autocomplete="off"
        placeholder="filtrar búsquedas…"
        title="filtra por término"
    />
    <div class="searches-list" id="searchesList"></div>
</div>

<div class="swipe" id="swipeView" hidden>
    <button class="swipe-x" id="swipeX" title="cerrar" data-icon="x"></button>
    <p class="swipe-sort-label">Ordenar por…</p>
    <div class="swipe-sort" id="swipeSort">
        <button data-sort="precio">Precio</button>
        <button data-sort="km">Distancia</button>
        <button data-sort="dias">Reciente</button>
    </div>
    <div class="swipe-count" id="swipeCount"></div>
    <div class="seller-banner" id="sellerBanner" hidden></div>
    <div class="swipe-stage" id="swipeStage">
        <div class="sc-badge like" id="swLikeStamp">
            <span><i data-icon="star"></i>Interesante</span>
        </div>
        <div class="sc-badge nope" id="swNopeStamp"><span>Rechazado</span></div>
    </div>
    <div class="swipe-excl" id="swExcl">
        <div class="chips" id="swExclChips"></div>
        <input
            id="swExclAdd"
            type="search"
            autocomplete="off"
            placeholder="excluir palabra…"
            title="las cartas con esa palabra en el título se descartan solas (solo en esta búsqueda)"
        />
    </div>
    <div class="swipe-actions">
        <button id="swCopy" class="ghost">Copiar datos</button>
        <button id="swVer" class="primary">
            Ver en Wallapop <i data-icon="external"></i>
        </button>
    </div>
</div>

<div class="snack" id="snack" hidden>
    <span id="snackmsg"></span>
    <button id="undo">Deshacer</button>
</div>

<script src="app.js"></script>
