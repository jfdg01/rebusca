<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
<title>Rebusca</title>
<link rel="stylesheet" href="app.css" />

<header>
    <div class="brand">
        <h1>Rebusca</h1>
        <img
            class="logo"
            src="wallapop-logo.webp"
            alt="Wallapop"
            width="40"
            height="40"
        />
        <span class="eyebrow">rebuscador<br />de chollos</span>
    </div>
    <div class="panel">
        <div class="search">
            <input
                type="search"
                id="kw"
                placeholder="Término a buscar…"
                autocomplete="off"
            />
            <select id="since" title="frescura del anuncio">
                <option value="">cualquiera</option>
                <option value="hora">última hora</option>
                <option value="dia">último día</option>
                <option value="semana" selected>última semana</option>
                <option value="mes">último mes</option>
            </select>
            <button id="scrape" class="primary">Buscar</button>
        </div>
    </div>
    <div class="panel picker">
        <span class="panel-label">Búsqueda activa</span>
        <div class="menu-row">
            <div class="qbox">
                <input id="pick" class="query" type="search" autocomplete="off"
                    placeholder="elige una búsqueda…"
                    title="tus búsquedas — escribe para filtrar" />
                <div id="qlist" class="qlist" hidden></div>
            </div>
            <button id="perfilChip" class="chip empty" title="cambiar de perfil">
                Sin perfil
            </button>
        </div>
        <div class="stat" id="stat"></div>
    </div>
    <div class="list-head" id="listHead" hidden>
        <button id="listBack" title="volver">←</button>
        <h2 id="listTitle"></h2>
    </div>
</header>

<table hidden>
    <thead></thead>
    <tbody></tbody>
</table>
<div class="empty" id="empty">
    Busca algo arriba o elige un CSV para empezar a rebuscar.
</div>

<div class="loading" id="loading" hidden>
    <svg class="spin" viewBox="0 0 44 44" aria-hidden="true">
        <circle class="track" cx="22" cy="22" r="19"></circle>
        <circle class="arc" cx="22" cy="22" r="19"></circle>
    </svg>
    <div class="loading-count" id="loadingCount">Buscando…</div>
    <div class="loading-note"><span id="loadingTime">0s</span> buscando…
        · <span class="link" id="stopScrape">parar búsqueda</span></div>
</div>

<button id="swipeFab" hidden>Empezar a swipe</button>

<div class="gate" id="gate">
    <div class="gate-inner">
        <h2 id="gateTitle">¿Quién eres?</h2>
        <div class="tiles" id="tiles"></div>
        <form class="creator" id="creator" hidden>
            <input
                id="newName"
                placeholder="tu nombre…"
                autocomplete="off"
                maxlength="40"
            />
            <div class="swatches" id="swatches"></div>
            <div class="creator-btns">
                <button type="button" class="ghost danger" id="deletePerfil" hidden>
                    Borrar
                </button>
                <button type="button" class="ghost" id="cancelCreate" hidden>
                    Volver
                </button>
                <button class="primary" type="submit" id="saveBtn">Entrar</button>
            </div>
        </form>
        <button class="gate-exit" id="gateX" hidden>Salir</button>
    </div>
</div>

<div class="swipe" id="swipeView" hidden>
    <button class="swipe-x" id="swipeX" title="cerrar">✕</button>
    <div class="swipe-count" id="swipeCount"></div>
    <div class="swipe-stage" id="swipeStage">
        <div class="sc-badge like" id="swLikeStamp"><span>★ Interesa</span></div>
        <div class="sc-badge nope" id="swNopeStamp"><span>Descartar</span></div>
    </div>
    <div class="swipe-actions">
        <button class="sw-btn nope" id="swNope">✕ Descartar</button>
        <button class="sw-btn ver" id="swVer">Ver</button>
        <button class="sw-btn like" id="swLike">★ Interesa</button>
    </div>
</div>

<div class="snack" id="snack" hidden>
    <span id="snackmsg"></span>
    <button id="undo">Deshacer</button>
</div>

<script src="app.js"></script>
