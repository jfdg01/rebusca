<title>Rebusca — sin acceso</title>
<style>
  :root {
    --mono: ui-monospace, "DejaVu Sans Mono", "SFMono-Regular", Menlo, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --paper: #E1E4DD;
    --surface: #F6F7F3;
    --surface-2: #EDEFE9;
    --ink: #1B211E;
    --ink-soft: #5A625D;
    --line: #C9CDC2;
    --pine: #13C1AC;
    --pine-ink: #0A736A;
    --pine-soft: #D3F1EC;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font: 13px/1.45 var(--sans); color: var(--ink); background: var(--paper);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 1.25rem;
  }
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 1px 2px rgba(27,33,30,.06);
    width: 100%; max-width: 22rem; padding: 1.4rem 1.3rem 1.5rem;
  }
  .brand-title { display: flex; align-items: center; gap: .5rem; justify-content: center; }
  .brand-title .logo { height: 2.1rem; width: auto; border-radius: 8px; display: block; }
  .brand-title h1 {
    font: 800 1.35rem/1 var(--mono); letter-spacing: -.02em; text-transform: uppercase; margin: 0;
  }
  .brand-title .eyebrow {
    font: 600 .54rem/1.2 var(--mono); letter-spacing: .16em; text-transform: uppercase;
    color: var(--ink-soft); white-space: nowrap; text-align: left;
  }
  .divider { height: 1px; background: var(--line); margin: 1.2rem 0; }
  .lead { font-weight: 700; font-size: 1.02rem; margin: 0 0 .5rem; }
  .msg { color: var(--ink-soft); margin: 0 0 1.2rem; }
  .msg b { color: var(--ink); font-weight: 600; }
  .cta {
    display: block; text-align: center; text-decoration: none;
    background: var(--pine); border: 1px solid var(--pine); border-radius: 9px;
    color: #fff; font: 600 .95rem var(--sans); padding: .7rem 1rem;
  }
  .cta:hover { background: #10A896; border-color: #10A896; }
  .alt { display: block; text-align: center; margin-top: .9rem; }
  .alt a { color: var(--pine-ink); text-decoration: underline; text-decoration-thickness: 1px; font-size: .82rem; }
</style>
</head>
